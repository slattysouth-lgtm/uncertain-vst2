name: Build UNCERTAIN VST Suite

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Install Git
        run: choco install git -y

      - name: Install CMake
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

      - name: Install Visual Studio 2022 Build Tools
        run: choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --quiet --wait" -y

      - name: Verify MSBuild installation
        run: |
          where msbuild
          vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath

      - name: Build all plugins and installer
        shell: cmd
        run: |
          cd "UNCERTAIN-VST"
          call BUILD-ALL.bat

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: uncertain-vst-suite-setup
          path: |
            UNCERTAIN-VST\Installer\UNCERTAIN-VST-Suite-Setup.exe
